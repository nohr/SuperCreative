<!DOCTYPE html>
<html>

<head>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <header>
    <h2>SuperCreative</h2>
    <span id="version">v1.0</span>
  </header>

  <hr>

  <section class="creatives">
    <label>Creatives Found:</label>
    <button id="select-all-btn" class="btn-secondary">Select All</button>
    <div id="creatives-list" class="creatives-list">
      <span class="loading">Scanning for creatives...</span>
    </div>
  </section>

  <hr>

  <section class="controls" id="controls-section">
    <label>Controls:</label>
    <div class="control-group">
      <span>Guide Opacity</span>
      <div class="guide-slider-container">
        <input type="range" id="guide-opacity-slider" min="0" max="2" value="0" step="1">
        <div class="guide-labels">
          <span class="label-0">Hidden</span>
          <span class="label-1">50%</span>
          <span class="label-2">Visible</span>
        </div>
      </div>
    </div>
  </section>

  <script src="../lib/browser-polyfill.js"></script>
  <script src="popup.js"></script>
</body>

</html>
