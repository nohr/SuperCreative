<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <header class="header">
    <span class="logo">SuperCreative</span>
    <span id="version" class="version-badge"></span>
  </header>

  <div class="section">
    <div class="section-header">
      <span class="section-label">Creatives</span>
      <button id="select-all-btn" class="btn-ghost" style="display:none">Select all</button>
    </div>
    <div id="creatives-list" class="list-panel">
      <span class="placeholder">Scanning for creatives…</span>
    </div>
  </div>

  <div class="section" id="guides-section" style="display:none">
    <div class="section-divider"></div>
    <div class="section-header">
      <span class="section-label">Guides</span>
    </div>
    <div id="guide-sliders" class="guide-sliders"></div>
  </div>

  <script src="../lib/browser-polyfill.js"></script>
  <script src="popup.js"></script>
</body>
</html>
